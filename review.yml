reviews:
  - date: '2026-06-03'
    rating: 2
    summary: >-
      QUT has a limited but genuine public developer footprint. The one clearly
      public, documented, no-auth machine interface confirmed live is the QUT
      ePrints OAI-PMH 2.0 endpoint (verb=Identify returns "QUT ePrints",
      protocol 2.0, admin eprints@qut.edu.au; ListMetadataFormats returns
      oai_dc, oai_bibl, oai_openaire, uketd_dc). Active research GitHub orgs
      exist (eResearch ~86 repos, plus qcr, qutas, QUTlib, QUT-Digital-Observatory).
      Library Search runs on Ex Libris Primo VE / Alma, which technically have
      vendor APIs, but QUT publishes no open developer docs or keys for them.
      The Timetable Planner, mobile app backend, and SSO/identity layer are
      gated and undocumented. No public open-data portal (e.g. data.qut.edu.au)
      was found. No endpoints fabricated; ratings reflect low public API maturity.
