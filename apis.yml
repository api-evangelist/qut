aid: qut
name: Queensland University of Technology
description: >-
  Queensland University of Technology (QUT) is a public research university
  based in Brisbane, Australia, ranked #213 in the QS World University Rankings
  2025. QUT serves around 50,000 students with an applied emphasis in teaching
  and research. Its public, machine-accessible developer footprint is modest and
  centered on open research infrastructure: the QUT ePrints institutional
  repository exposes a live OAI-PMH metadata harvesting interface, and QUT
  maintains several active research-group GitHub organizations (eResearch,
  Centre for Robotics, Aerospace Systems, Digital Observatory). Most other
  institutional systems (Library Search built on Ex Libris Primo VE / Alma, the
  Timetable Planner, the QUT mobile app backend, and the SSO identity layer) are
  internal or gated and do not publish open developer documentation.
