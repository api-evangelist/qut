apis:
  - aid: qut:eprints-oai
    name: QUT ePrints OAI-PMH
    description: >-
      OAI-PMH 2.0 metadata harvesting interface for the QUT ePrints institutional
      repository, an open collection of research outputs (journal articles,
      conference papers, theses) produced by QUT staff and postgraduate students.
      Metadata is freely harvestable without authentication and supports the
      oai_dc, oai_bibl, oai_openaire, and uketd_dc metadata formats. The
      repository runs on GNU EPrints software.
